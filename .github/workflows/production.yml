name: Production Deploy

concurrency: production

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag_version.outputs.new_tag }}
      new_version: ${{ steps.tag_version.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: master
          tag_prefix: v

  build-web:
    needs: tag
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/web
          tags: |
            type=raw,value=production
            type=raw,value=${{ needs.tag.outputs.new_tag }}
            type=sha
          labels: |
            project=mulai-plus

      - name: Create .env.production for Web
        run: |
          if [ -f apps/web/.env.example ]; then
            cp apps/web/.env.example apps/web/.env.production
          else
            touch apps/web/.env.production
          fi

      - name: Build and push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_APP_URL=https://mulaiplus.id
            NEXT_PUBLIC_SERVER_URL=${{ secrets.NEXT_PUBLIC_SERVER_URL }}
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-server:
    needs: tag
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/server
          tags: |
            type=raw,value=production
            type=raw,value=${{ needs.tag.outputs.new_tag }}
            type=sha
          labels: |
            project=mulai-plus

      - name: Build and push Server
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  migrate:
    needs: tag
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Push database schema
        working-directory: packages/db
        run: bun run db:push
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  deploy:
    needs: [build-web, build-server, migrate]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_PASSPHRASE }}
          script: |
            set -euo pipefail

            mkdir -p "${{ secrets.VPS_PROJECT_PATH }}"
            cd "${{ secrets.VPS_PROJECT_PATH }}"

            # Pakai token bawaan workflow (tanpa repo/env secret tambahan)
            echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

            cat > docker-compose.production.yml << 'EOF'
            version: "3.9"

            services:
              web:
                image: ghcr.io/${GITHUB_REPOSITORY}/web:production
                container_name: mulai-plus-web-production
                ports:
                  - "${PORT_WEB:-3002}:3000"
                expose:
                  - "3000"
                environment:
                  - PORT=3000
                  - NEXT_PUBLIC_SERVER_URL=http://server:3000
                  - DATABASE_URL=${DATABASE_URL}
                restart: always
                networks:
                  - shared_proxy

              server:
                image: ghcr.io/${GITHUB_REPOSITORY}/server:production
                container_name: mulai-plus-server-production
                ports:
                  - "${PORT_SERVER:-3004}:3000"
                expose:
                  - "3000"
                environment:
                  - PORT=3000
                  - DATABASE_URL=${DATABASE_URL}
                  - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
                  - BETTER_AUTH_URL=${BETTER_AUTH_URL}
                  - CORS_ORIGIN=https://mulaiplus.id
                  - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
                  - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
                  - PAYMENT_API_URL=${PAYMENT_API_URL}
                  - PAYMENT_API_KEY=${PAYMENT_API_KEY}
                restart: always
                networks:
                  - shared_proxy

            networks:
              shared_proxy:
                external: true
            EOF

            cat > .env.production << EOF
            GITHUB_REPOSITORY=$REPO_LOWER
            NODE_ENV=production
            PORT_WEB=3002
            PORT_SERVER=3004
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }}
            BETTER_AUTH_URL=${{ secrets.BETTER_AUTH_URL }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            PAYMENT_API_URL=${{ secrets.PAYMENT_API_URL }}
            PAYMENT_API_KEY=${{ secrets.PAYMENT_API_KEY }}
            EOF

            docker compose -p mulaiplus-production -f docker-compose.production.yml --env-file .env.production pull
            docker compose -p mulaiplus-production -f docker-compose.production.yml --env-file .env.production down
            docker compose -p mulaiplus-production -f docker-compose.production.yml --env-file .env.production up -d --force-recreate

            docker image prune -f --filter "label=project=mulai-plus"
