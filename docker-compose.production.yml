version: "3.9"

services:
  web:
    image: ghcr.io/${GITHUB_REPOSITORY}/web:production
    container_name: mulai-plus-web-production
    ports:
      - "${PORT_WEB:-3002}:3000"
    expose:
      - "3000"
    environment:
      - PORT=3000
      - NEXT_PUBLIC_SERVER_URL=http://server:3000
      - DATABASE_URL=${DATABASE_URL}
    restart: always
    networks:
      - shared_proxy

  ai:
    image: ghcr.io/${GITHUB_REPOSITORY}/ai:production
    container_name: mulai-plus-ai-production
    expose:
      - "8000"
    environment:
      - AI_HOST=0.0.0.0
      - AI_PORT=8000
      - AI_API_KEY=${AI_API_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-http://43.157.247.204:20128/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-free-stack}
      - CORS_ORIGIN=https://mulaiplus.id
      - API_SERVER_URL=http://server:3000
    restart: always
    networks:
      - shared_proxy

  server:
    image: ghcr.io/${GITHUB_REPOSITORY}/server:production
    container_name: mulai-plus-server-production
    ports:
      - "${PORT_SERVER:-3004}:3000"
    expose:
      - "3000"
    environment:
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - CORS_ORIGIN=https://mulaiplus.id
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - PAYMENT_API_URL=${PAYMENT_API_URL}
      - PAYMENT_API_KEY=${PAYMENT_API_KEY}
      - UNOSEND_API_KEY=${UNOSEND_API_KEY}
      - UNOSEND_FROM_EMAIL=${UNOSEND_FROM_EMAIL}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL}
      # AI Service
      - AI_SERVICE_URL=http://ai:8000
      - AI_API_KEY=${AI_API_KEY}
      # Cloudflare R2 Storage
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL}
    restart: always
    networks:
      - shared_proxy

networks:
  shared_proxy:
    external: true
