version: "3.9"

services:
  web:
    image: ghcr.io/${GITHUB_REPOSITORY}/web:staging
    container_name: mulai-plus-web-staging
    ports:
      - "${PORT_WEB:-3001}:3000"
    expose:
      - "3000"
    environment:
      - PORT=3000
      - NEXT_PUBLIC_SERVER_URL=http://server:3000
      - DATABASE_URL=${DATABASE_URL}
    restart: always
    networks:
      - shared_proxy

  ai:
    build: ./apps/ai
    container_name: mulai-plus-ai-staging
    # No ports mapping — only accessible internally via server proxy
    expose:
      - "8000"
    environment:
      - AI_HOST=0.0.0.0
      - AI_PORT=8000
      - AI_API_KEY=${AI_API_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-deepseek-v4-flash}
      - CORS_ORIGIN=https://staging.mulaiplus.id
      - API_SERVER_URL=http://server:3000
    restart: always
    networks:
      - shared_proxy
    profiles:
      - ai

  server:
    image: ghcr.io/${GITHUB_REPOSITORY}/server:staging
    container_name: mulai-plus-server-staging
    ports:
      - "${PORT_SERVER:-3000}:3000"
    expose:
      - "3000"
    environment:
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - CORS_ORIGIN=https://staging.mulaiplus.id
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - PAYMENT_API_URL=${PAYMENT_API_URL}
      - PAYMENT_API_KEY=${PAYMENT_API_KEY}
      - UNOSEND_API_KEY=${UNOSEND_API_KEY}
      - UNOSEND_FROM_EMAIL=${UNOSEND_FROM_EMAIL}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL}
      # AI Service
      - AI_SERVICE_URL=http://ai:8000
      - AI_API_KEY=${AI_API_KEY}
      # Cloudflare R2 Storage
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL}
    restart: always
    networks:
      - shared_proxy

networks:
  shared_proxy:
    external: true
